version: "3.9"

services:
  suave:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.10"
        INSTALL_EXTERNAL_TOOLS: "true"
        # Optionally provide SU2 and AVL downloads (set to empty to skip)
        # e.g., SU2 v8 prebuilt tar.gz for Linux x86_64
        SU2_DOWNLOAD_URL: ""
        # e.g., direct URL to avl binary (user-provided hosting)
        AVL_DOWNLOAD_URL: ""
    image: suave-student:latest
    container_name: suave-student
    working_dir: /workspace
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/entrypoint.sh"]
    command: ["jupyter"]
    environment:
      - MPLBACKEND=Agg
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/trunk:/workspace/student_competition
      - JUPYTER_TOKEN=
      - PORT=8888
      - AVL_BIN=/usr/local/bin/avl
      - SU2_HOME=/opt/su2
      - SU2_RUN=/opt/su2/bin
      - SU2_BIN=/opt/su2/bin/SU2_CFD
      - OPENVSP_BIN=
      - GMSH_BIN=/usr/bin/gmsh
    volumes:
      - ./:/workspace:delegated
      - suave-cache:/root/.cache
    ports:
      - "8888:8888"
    tty: true
    stdin_open: true

volumes:
  suave-cache: