version: "3.9"

services:
  suave:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.10"
        INSTALL_EXTERNAL_TOOLS: "true"
        SU2_DOWNLOAD_URL: "https://github.com/su2code/SU2/releases/download/v8.2.0/SU2-8.2.0-Linux.tar.gz"
        SU2_SHA256: "fa56a890c16ca83715d7e62b351ff0528fcb92f70100129caf6382a8945b95fb"
        AVL_DOWNLOAD_URL: "http://web.mit.edu/drela/Public/web/avl/avl3.40b.tgz"
    image: suave-student:latest
    container_name: suave-student
    working_dir: /workspace
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/entrypoint.sh"]
    command: ["jupyter"]
    environment:
      - MPLBACKEND=Agg
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/trunk:/workspace/student_competition
      - JUPYTER_TOKEN=
      - PORT=8888
      - AVL_BIN=/usr/local/bin/avl
      - SU2_HOME=/opt/su2
      - SU2_RUN=/opt/su2/bin
      - SU2_BIN=/opt/su2/bin/SU2_CFD
      - OPENVSP_BIN=
      - GMSH_BIN=/usr/bin/gmsh
    volumes:
      - ./:/workspace:delegated
      - suave-cache:/root/.cache
    ports:
      - "8888:8888"
    tty: true
    stdin_open: true

volumes:
  suave-cache: